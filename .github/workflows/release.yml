name: Release Obsidian plugin

on:
    push:
        branches: [main]

jobs:
    release:
        # version bump 提交含 [skip ci],防止循环触发
        if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
            attestations: write
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: 'npm'

            - name: Auto bump version
              id: version
              run: |
                  CURRENT=$(jq -r '.version' manifest.json)
                  # 递增 patch 版本: 1.0.0 → 1.0.1
                  NEW=$(echo "$CURRENT" | awk -F. '{printf "%d.%d.%d", $1, $2, $3+1}')
                  echo "new=$NEW" >> "$GITHUB_OUTPUT"

                  # 更新 manifest.json
                  jq ".version = \"$NEW\"" manifest.json > /tmp/manifest.json
                  mv /tmp/manifest.json manifest.json

                  # 更新 versions.json:追加新版本映射(沿用上一个版本的 minAppVersion)
                  PREV=$(jq -r 'keys[-1]' versions.json)
                  MIN_APP=$(jq -r ".[\"$PREV\"]" versions.json)
                  jq ". + {\"$NEW\": \"$MIN_APP\"}" versions.json > /tmp/versions.json
                  mv /tmp/versions.json versions.json

            - name: Build plugin
              run: |
                  npm ci
                  npm run build

            - name: Check for optional styles
              id: styles
              run: |
                  [ -f styles.css ] && echo "exists=true" >> "$GITHUB_OUTPUT" || echo "exists=false" >> "$GITHUB_OUTPUT"

            - name: Attest build provenance
              uses: actions/attest-build-provenance@v1
              with:
                  subject-path: |
                      main.js
                      ${{ steps.styles.outputs.exists == 'true' && 'styles.css' || '' }}

            - name: Commit, tag & release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  NEW="${{ steps.version.outputs.new }}"

                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  git add manifest.json versions.json
                  git commit -m "chore(release): $NEW [skip ci]"
                  git tag "$NEW"

                  git push origin HEAD:main
                  git push origin "$NEW"

                  gh release create "$NEW" \
                    --title="$NEW" \
                    --generate-notes \
                    main.js manifest.json ${{ steps.styles.outputs.exists == 'true' && 'styles.css' || '' }}
