<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>完善历史树 — Canvas 原型</title>
<style>
  :root{
    --bg:#ffffff; --ink:#1a1b1f; --muted:#6b7280;
    --created:#22a06b; --pending:#d97706; --stale:#9ca3af;
    --accent:#3b6ef7; --soft:#d8dce3;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font:13px/1.4 -apple-system,"Segoe UI",Roboto,"Microsoft YaHei",sans-serif}
  #app{position:relative;height:100%}
  #wrap{position:absolute;inset:0;overflow:hidden;background:var(--bg)}
  canvas{display:block;width:100%;height:100%;cursor:grab}
  canvas.drag{cursor:grabbing}
  #scope{position:absolute;top:10px;left:10px;z-index:6;display:flex;align-items:center;gap:6px;
    background:#fff;border:1px solid var(--soft);border-radius:8px;padding:5px 9px;
    box-shadow:0 4px 14px rgba(0,0,0,.06);font-size:12px}
  #scope span{color:var(--muted)}
  #scope select{border:1px solid var(--soft);border-radius:5px;padding:2px 4px;font-size:12px;background:#fff;color:var(--ink);max-width:220px}
  #tooltip{position:absolute;pointer-events:none;background:#fff;border:1px solid var(--soft);
    border-radius:6px;padding:6px 9px;font-size:12px;max-width:300px;display:none;z-index:5;
    color:var(--ink);box-shadow:0 4px 14px rgba(0,0,0,.08)}
  #hint{position:absolute;left:10px;bottom:8px;color:var(--muted);font-size:11px}
</style>
</head>
<body>
<div id="app">
  <div id="wrap">
    <canvas id="cv"></canvas>
    <div id="scope"><span>当前笔记</span>
      <select id="active-note">
        <option value="概率论/知识点.md">概率论/知识点</option>
        <option value="概率论/一维随机变量及其分布.md">概率论/一维随机变量及其分布</option>
        <option value="111/详细解释双重内存访问.md">111/详细解释双重内存访问</option>
        <option value="">（全部作用域）</option>
      </select>
    </div>
    <div id="tooltip"></div>
    <div id="hint">拖动平移 · 滚轮缩放 · 点节点直接跳转 · 点节点右侧 +/− 折叠子树 · 双击复位</div>
  </div>
</div>
<script>
// ===== 测试数据：基于 123 vault 的模拟捕获历史（4 次完善批次）=====
const EVENTS = [
  {id:'e1', target:'概率论四大公式概念推导', sourcePath:'概率论/知识点.md', position:{line:1,col:0}, firstSeenAt:1, runId:'R1'},
  {id:'e2', target:'加法概率、古典概率、条件概率、全概率的区别，以及什么情况下使用', sourcePath:'概率论/知识点.md', position:{line:2,col:0}, firstSeenAt:2, runId:'R1'},
  {id:'e3', target:'一维随机变量及其分布', sourcePath:'概率论/知识点.md', position:{line:4,col:0}, firstSeenAt:3, runId:'R1'},
  {id:'e16', target:'VTable（虚表）完整底层技术详解', sourcePath:'111/详细解释双重内存访问.md', position:{line:5,col:0}, firstSeenAt:5, runId:'R1'},
  {id:'e17', target:'什么是间接偏移表', sourcePath:'111/VTable（虚表）完整底层技术详解.md', position:{line:94,col:0}, firstSeenAt:6, runId:'R1'},
  {id:'e4', target:'离散型随机变量', sourcePath:'概率论/一维随机变量及其分布.md', position:{line:77,col:0}, firstSeenAt:11, runId:'R2'},
  {id:'e5', target:'常见题型', sourcePath:'概率论/一维随机变量及其分布.md', position:{line:79,col:0}, firstSeenAt:12, runId:'R2'},
  {id:'e6', target:'为什么多阶段用全概率公式', sourcePath:'概率论/概率论四大公式概念推导.md', position:{line:67,col:0}, firstSeenAt:13, runId:'R2'},
  {id:'e7', target:'难点在于找什么是A，什么是B1、2、3', sourcePath:'概率论/概率论四大公式概念推导.md', position:{line:69,col:0}, firstSeenAt:14, runId:'R2'},
  {id:'e8', target:'阶段必须按照时间关系，不能结果反推？为什么，和贝叶斯公式的根因在哪', sourcePath:'概率论/概率论四大公式概念推导.md', position:{line:71,col:0}, firstSeenAt:15, runId:'R2'},
  {id:'e9', target:'是不是还有伯努利概型，为什么没有写入', sourcePath:'概率论/概率论四大公式概念推导.md', position:{line:96,col:0}, firstSeenAt:16, runId:'R2'},
  {id:'e10', target:'离散型随机变量求分布律', sourcePath:'概率论/常见题型.md', position:{line:2,col:0}, firstSeenAt:21, runId:'R3'},
  {id:'e11', target:'离散型分布律求概率', sourcePath:'概率论/常见题型.md', position:{line:4,col:0}, firstSeenAt:22, runId:'R3'},
  {id:'e12', target:'连续型R、V相关计算', sourcePath:'概率论/常见题型.md', position:{line:7,col:0}, firstSeenAt:23, runId:'R3'},
  {id:'e13', target:'多维随机变量', sourcePath:'概率论/离散型分布律求概率.md', position:{line:201,col:0}, firstSeenAt:24, runId:'R3'},
  {id:'e14', target:'伯努利概型与独立性的关系', sourcePath:'概率论/是不是还有伯努利概型，为什么没有写入.md', position:{line:90,col:0}, firstSeenAt:31, runId:'R4'},
  {id:'e15', target:'贝叶斯公式的认知论解释', sourcePath:'概率论/阶段必须按照时间关系，不能结果反推？为什么，和贝叶斯公式的根因在哪.md', position:{line:120,col:0}, firstSeenAt:32, runId:'R4'},
  {id:'e18', target:'某遗留概念（源笔记已删）', sourcePath:'概率论/已删除的旧笔记.md', position:{line:3,col:0}, firstSeenAt:33, runId:'R4'}
];
const PENDING_TARGETS = new Set(['伯努利概型与独立性的关系','贝叶斯公式的认知论解释']);
const STALE_SOURCES  = new Set(['概率论/已删除的旧笔记.md']);
const collapsed = new Set();
let activeNotePath = '概率论/知识点.md';   // 模拟「当前打开的笔记」（真实插件取 active markdown view）

// ===== normalize / 作用域 =====
const normTarget = t => t.replace(/#.*/,'').trim();
const basename   = p => (p.split('/').pop()||p).replace(/\.md$/i,'');
const firstSeg   = p => (p.includes('/') ? p.slice(0,p.indexOf('/')) : '(root)');
function zoneEvents(){
  if(activeNotePath==='') return EVENTS;
  const z = firstSeg(activeNotePath);
  return EVENTS.filter(e => firstSeg(e.sourcePath) === z);
}

// ===== projectTree —— O(E) =====
function projectTree(events){
  const byTarget = new Map();
  for(const e of events) byTarget.set(normTarget(e.target), e);
  const nodes = new Map();
  for(const e of events) nodes.set(e.id, {
    event:e, children:[],
    status:  PENDING_TARGETS.has(e.target) ? 'pending' : 'created',
    isStale: STALE_SOURCES.has(e.sourcePath)
  });
  const roots = [];
  for(const e of events){
    const n = nodes.get(e.id);
    const parent = byTarget.get(basename(e.sourcePath));
    if(parent && parent.id !== e.id) nodes.get(parent.id).children.push(n);
    else roots.push(n);
  }
  const ghostMap = new Map(), bareRoots = [];
  for(const r of roots){
    const sp = r.event.sourcePath;
    if(r.isStale){ bareRoots.push(r); continue; }
    if(!ghostMap.has(sp)) ghostMap.set(sp,{ghost:true,name:basename(sp),sourcePath:sp,children:[]});
    ghostMap.get(sp).children.push(r);
  }
  return [...ghostMap.values(), ...bareRoots];
}

// ===== layoutTree —— 从左到右 O(n) =====
const NODE_W=200, NODE_H=44, XGAP=54, YGAP=16, FOREST_GAP=44, ICON_R=9, ICON_DX=13;
function setDesc(n){ let d=0; for(const c of n.children) d += 1 + setDesc(c); return n._desc=d; }
function layout(forest){
  forest.forEach(setDesc);
  let leaf = 0;
  function assign(n, depth){
    n.depth = depth; n.x = 60 + depth*(NODE_W+XGAP);
    n._hasChildren = n.children.length>0;
    n._collapsed = n._hasChildren && collapsed.has(n.key);
    if(!n._hasChildren || n._collapsed){
      n.y = leaf*(NODE_H+YGAP); leaf++;
      if(depth===0) leaf += Math.round(FOREST_GAP/(NODE_H+YGAP));
      return;
    }
    for(const c of n.children) assign(c, depth+1);
    const ys = n.children.map(c=>c.y);
    n.y = (Math.min(...ys)+Math.max(...ys))/2;
    if(depth===0) leaf += Math.round(FOREST_GAP/(NODE_H+YGAP));
  }
  forest.forEach(r=>assign(r,0));
}

// ===== canvas + viewport =====
const canvas = document.getElementById('cv'), ctx = canvas.getContext('2d');
const vp = {tx:0, ty:0, scale:1};
let forest=[], flatNodes=[], ghostNodes=[], hovered=null, selected=null;

function setKey(n){ n.key = n.ghost ? n.sourcePath : n.event.target; n.children.forEach(setKey); }
function rebuild(){
  forest = projectTree(zoneEvents());
  forest.forEach(setKey);
  layout(forest);
  flatNodes=[]; ghostNodes=[];
  function walk(n){ (n.ghost?ghostNodes:flatNodes).push(n); if(!n._collapsed) n.children.forEach(walk); }
  forest.forEach(walk);
  render(); fitView();
}

// ===== 绘制 =====
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
function textEllipsis(t,x,y,maxW){
  if(ctx.measureText(t).width<=maxW){ ctx.fillText(t,x,y); return; }
  let lo=0, hi=t.length;
  while(lo<hi){ const m=(lo+hi)>>1; if(ctx.measureText(t.slice(0,m)+'…').width<=maxW) lo=m+1; else hi=m; }
  ctx.fillText(t.slice(0,Math.max(0,lo-1))+'…', x, y);
}
function getCss(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
function drawGrid(w,h){
  const gap = Math.max(10, 24*vp.scale);
  const ox = ((vp.tx%gap)+gap)%gap, oy = ((vp.ty%gap)+gap)%gap;
  ctx.fillStyle = '#eceff3';
  for(let x=ox; x<w; x+=gap) for(let y=oy; y<h; y+=gap) ctx.fillRect(x,y,1,1);
}
function edgeColor(c){ return c.ghost ? '#e2e5ea' : '#c4c9d2'; }
function drawEdge(p,c){
  const x1=p.x+NODE_W, y1=p.y+NODE_H/2, x2=c.x, y2=c.y+NODE_H/2, mx=(x1+x2)/2;
  ctx.strokeStyle = edgeColor(c); ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.bezierCurveTo(mx,y1,mx,y2,x2,y2); ctx.stroke();
}
function drawToggle(n){
  if(!n._hasChildren) return;
  const cx=n.x+NODE_W+ICON_DX, cy=n.y+NODE_H/2;
  ctx.beginPath(); ctx.arc(cx,cy,ICON_R,0,7);
  ctx.fillStyle='#fff'; ctx.fill();
  ctx.lineWidth=1; ctx.strokeStyle = n._collapsed ? getCss('--accent') : '#c4c9d2';
  ctx.stroke();
  ctx.fillStyle = n._collapsed ? getCss('--accent') : '#6b7280';
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.font='bold 11px sans-serif';
  ctx.fillText(n._collapsed ? String(n._desc) : '−', cx, cy+1);
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
}
function drawGhost(n){
  ctx.save();
  ctx.setLineDash([4,3]); ctx.strokeStyle='#b4b9c2'; ctx.fillStyle='#f3f4f6';
  roundRect(n.x,n.y,NODE_W,NODE_H,8); ctx.fill(); ctx.stroke();
  ctx.setLineDash([]); ctx.fillStyle='#6b7280'; ctx.font='12px sans-serif';
  textEllipsis('📁 '+n.name, n.x+12, n.y+NODE_H/2+4, NODE_W-24);
  ctx.restore();
  drawToggle(n);
}
function drawNode(n){
  const stale=n.isStale;
  const color = stale ? getCss('--stale') : (n.status==='created' ? getCss('--created') : getCss('--pending'));
  const isSel = selected===n, isHov = hovered===n;
  if(isSel||isHov){ ctx.fillStyle='rgba(59,110,247,0.10)'; roundRect(n.x-5,n.y-5,NODE_W+10,NODE_H+10,11); ctx.fill(); }
  ctx.fillStyle = '#ffffff';
  roundRect(n.x,n.y,NODE_W,NODE_H,8); ctx.fill();
  ctx.fillStyle = color; roundRect(n.x,n.y,4,NODE_H,2); ctx.fill();
  ctx.lineWidth = 1; ctx.strokeStyle = isSel ? getCss('--accent') : '#d8dce3';
  roundRect(n.x,n.y,NODE_W,NODE_H,8); ctx.stroke();
  ctx.fillStyle = color; ctx.beginPath(); ctx.arc(n.x+16,n.y+NODE_H/2,4,0,7); ctx.fill();
  ctx.fillStyle = stale ? '#9ca3af' : '#1f2330'; ctx.font='12.5px sans-serif';
  if(stale) ctx.globalAlpha=0.7;
  textEllipsis(n.event.target, n.x+28, n.y+NODE_H/2+4, NODE_W-64);
  ctx.globalAlpha=1;
  ctx.fillStyle='#9aa0ab'; ctx.font='10px sans-serif';
  ctx.fillText(n.event.runId, n.x+NODE_W-24, n.y+13);
  drawToggle(n);
}
function render(){
  const dpr = window.devicePixelRatio||1;
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if(canvas.width!==w*dpr||canvas.height!==h*dpr){ canvas.width=w*dpr; canvas.height=h*dpr; }
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,w,h);
  drawGrid(w,h);
  ctx.save();
  ctx.translate(vp.tx,vp.ty); ctx.scale(vp.scale,vp.scale);
  forest.forEach(r=>{ (function de(n){ if(n._collapsed) return; n.children.forEach(c=>{drawEdge(n,c);de(c);}); })(r); });
  ghostNodes.forEach(drawGhost);
  flatNodes.forEach(drawNode);
  ctx.restore();
}

// ===== hit-test + 输入 =====
function screenToWorld(px,py){ return {x:(px-vp.tx)/vp.scale, y:(py-vp.ty)/vp.scale}; }
function hitIcon(px,py){
  const {x,y} = screenToWorld(px,py);
  const list = [...flatNodes, ...ghostNodes];
  for(const n of list){
    if(!n._hasChildren) continue;
    const cx=n.x+NODE_W+ICON_DX, cy=n.y+NODE_H/2;
    if(Math.hypot(x-cx,y-cy) <= ICON_R+3) return n;
  }
  return null;
}
function hit(px,py){
  const {x,y} = screenToWorld(px,py);
  const list = [...flatNodes, ...ghostNodes];
  for(let i=list.length-1;i>=0;i--){
    const n=list[i];
    if(x>=n.x && x<=n.x+NODE_W && y>=n.y && y<=n.y+NODE_H) return n;
  }
  return null;
}
function toggle(n){
  if(collapsed.has(n.key)) collapsed.delete(n.key); else collapsed.add(n.key);
  rebuild();
}
// 点击节点 = 直接跳转（真实插件调 openSource，这里模拟）
function jumpTo(n){
  if(!n || n.ghost) return;
  selected=n; render();
  alert('（原型模拟）跳转 →\n'+n.event.sourcePath+' : 行 '+n.event.position.line
    +'\n\n状态：'+(n.isStale?'源笔记已删':n.status==='created'?'✓ 已创建':'⏳ 待处理')
    +' · 批次：'+n.event.runId);
}
let dragging=false, moved=false, lastX=0, lastY=0, startPt=null;
canvas.addEventListener('pointerdown', e=>{
  canvas.setPointerCapture(e.pointerId);
  dragging=true; moved=false; lastX=e.clientX; lastY=e.clientY; startPt={x:e.clientX,y:e.clientY};
  canvas.classList.add('drag');
});
canvas.addEventListener('pointermove', e=>{
  const rect = canvas.getBoundingClientRect();
  const px=e.clientX-rect.left, py=e.clientY-rect.top;
  if(dragging){
    if(startPt && Math.hypot(e.clientX-startPt.x, e.clientY-startPt.y)>3) moved=true;
    vp.tx += e.clientX-lastX; vp.ty += e.clientY-lastY;
    lastX=e.clientX; lastY=e.clientY; render();
  } else {
    const ic = hitIcon(px,py);
    const h = ic || hit(px,py);
    if(h!==hovered){ hovered=h; render(); }
    const tip=document.getElementById('tooltip');
    if(ic){
      canvas.style.cursor='pointer';
      tip.style.display='block'; tip.style.left=(px+14)+'px'; tip.style.top=(py+14)+'px';
      tip.innerHTML = ic._collapsed ? '<b>展开</b><br><span style="color:#6b7280">显示 '+ic._desc+' 个子节点</span>'
                                    : '<b>折叠</b><br><span style="color:#6b7280">隐藏 '+(ic._desc||0)+' 个子节点</span>';
    } else if(h){
      canvas.style.cursor='pointer';
      tip.style.display='block'; tip.style.left=(px+14)+'px'; tip.style.top=(py+14)+'px';
      tip.innerHTML = h.ghost
        ? '<b>原生笔记（上下文）</b><br><span style="color:#6b7280">'+h.sourcePath+'</span>'
        : '<b>'+h.event.target+'</b><br><span style="color:#6b7280">点击跳转 → '+h.event.sourcePath+':'+h.event.position.line+'</span>';
    } else { canvas.style.cursor='grab'; tip.style.display='none'; }
  }
});
canvas.addEventListener('pointerup', e=>{
  dragging=false; canvas.classList.remove('drag');
  if(!moved){
    const rect=canvas.getBoundingClientRect();
    const px=e.clientX-rect.left, py=e.clientY-rect.top;
    const ic = hitIcon(px,py);
    if(ic){ toggle(ic); return; }
    jumpTo(hit(px,py));
  }
});
canvas.addEventListener('pointerleave', ()=>{ hovered=null; document.getElementById('tooltip').style.display='none'; render(); });
canvas.addEventListener('wheel', e=>{
  e.preventDefault();
  const rect=canvas.getBoundingClientRect(), mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const wx=(mx-vp.tx)/vp.scale, wy=(my-vp.ty)/vp.scale;
  vp.scale = Math.min(3, Math.max(0.2, vp.scale * Math.exp(-e.deltaY*0.0015)));
  vp.tx = mx-wx*vp.scale; vp.ty = my-wy*vp.scale;
  render();
},{passive:false});

// ===== 缩放 / 复位 =====
function zoomBy(f){
  const w=canvas.clientWidth/2, h=canvas.clientHeight/2;
  const wx=(w-vp.tx)/vp.scale, wy=(h-vp.ty)/vp.scale;
  vp.scale = Math.min(3, Math.max(0.2, vp.scale*f));
  vp.tx=w-wx*vp.scale; vp.ty=h-wy*vp.scale; render();
}
function fitView(){
  const all=[...flatNodes,...ghostNodes];
  if(!all.length){ render(); return; }
  let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
  for(const n of all){ minX=Math.min(minX,n.x); minY=Math.min(minY,n.y); maxX=Math.max(maxX,n.x+NODE_W+ICON_DX+ICON_R); maxY=Math.max(maxY,n.y+NODE_H); }
  const w=canvas.clientWidth, h=canvas.clientHeight, pad=60;
  const sx=w/((maxX-minX)+pad), sy=h/((maxY-minY)+pad);
  vp.scale = Math.min(2, Math.min(sx,sy));
  vp.tx = (w-(maxX+minX)*vp.scale)/2;
  vp.ty = (h-(maxY+minY)*vp.scale)/2;
  render();
}
canvas.addEventListener('dblclick', fitView);

// 当前笔记切换 → 重新作用域过滤
document.getElementById('active-note').addEventListener('change', e=>{
  activeNotePath = e.target.value;
  collapsed.clear();
  rebuild();
});
window.addEventListener('resize', render);
rebuild();
</script>
</body>
</html>
